<svg viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="260" fill="#0f172a" rx="16"/>
  <text x="500" y="40" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="bold">How a Website Works — 5 Stages</text>

  <!-- Stage boxes -->
  <g font-size="15" font-weight="bold" fill="#ffffff">
    <rect x="20" y="90" width="160" height="90" rx="12" fill="#0ea5e9"/>
    <text x="100" y="130" text-anchor="middle">1. DNS</text>
    <text x="100" y="150" text-anchor="middle" font-size="11" font-weight="normal">Domain → IP</text>

    <rect x="220" y="90" width="160" height="90" rx="12" fill="#14b8a6"/>
    <text x="300" y="130" text-anchor="middle">2. TCP</text>
    <text x="300" y="150" text-anchor="middle" font-size="11" font-weight="normal">3-Way Handshake</text>

    <rect x="420" y="90" width="160" height="90" rx="12" fill="#f59e0b"/>
    <text x="500" y="130" text-anchor="middle">3. TLS</text>
    <text x="500" y="150" text-anchor="middle" font-size="11" font-weight="normal">Encryption</text>

    <rect x="620" y="90" width="160" height="90" rx="12" fill="#ef4444"/>
    <text x="700" y="130" text-anchor="middle">4. HTTP</text>
    <text x="700" y="150" text-anchor="middle" font-size="11" font-weight="normal">Request / Response</text>

    <rect x="820" y="90" width="160" height="90" rx="12" fill="#8b5cf6"/>
    <text x="900" y="130" text-anchor="middle">5. Render</text>
    <text x="900" y="150" text-anchor="middle" font-size="11" font-weight="normal">DOM + CSSOM → Paint</text>
  </g>

  <!-- Arrows -->
  <g stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="180" y1="135" x2="215" y2="135"/>
    <line x1="380" y1="135" x2="415" y2="135"/>
    <line x1="580" y1="135" x2="615" y2="135"/>
    <line x1="780" y1="135" x2="815" y2="135"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="500" y="225" text-anchor="middle" fill="#94a3b8" font-size="13">Browser → DNS Lookup → TCP Connection → TLS Handshake → HTTP Request/Response → Page Rendered</text>
</svg>
