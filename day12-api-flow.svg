<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="340" fill="#0f172a" rx="16"/>
  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">API Request / Response Cycle</text>

  <rect x="60" y="70" width="140" height="55" rx="10" fill="#0ea5e9"/>
  <text x="130" y="103" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Client</text>

  <rect x="600" y="70" width="140" height="55" rx="10" fill="#14b8a6"/>
  <text x="670" y="103" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Server</text>

  <line x1="200" y1="100" x2="595" y2="100" stroke="#94a3b8" stroke-width="2" marker-end="url(#a3)"/>
  <text x="400" y="90" text-anchor="middle" fill="#f8fafc" font-size="12" font-family="monospace">GET /users?sort=asc&amp;limit=10</text>

  <line x1="600" y1="140" x2="205" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#a3)"/>
  <text x="400" y="132" text-anchor="middle" fill="#f8fafc" font-size="12" font-family="monospace">200 OK + JSON data</text>

  <!-- Query breakdown -->
  <rect x="60" y="170" width="680" height="55" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="80" y="203" fill="#4ade80" font-size="13" font-family="monospace">/users/5 ? sort=asc &amp; limit=10</text>
  <text x="600" y="190" fill="#fbbf24" font-size="10">↑ path param</text>
  <text x="700" y="215" fill="#f472b6" font-size="10">↑ query string</text>

  <!-- Status codes -->
  <g font-size="12" font-weight="bold" fill="white">
    <rect x="60" y="250" width="100" height="40" rx="8" fill="#22c55e"/><text x="110" y="275" text-anchor="middle">200 OK</text>
    <rect x="175" y="250" width="120" height="40" rx="8" fill="#3b82f6"/><text x="235" y="275" text-anchor="middle">201 Created</text>
    <rect x="310" y="250" width="150" height="40" rx="8" fill="#f59e0b"/><text x="385" y="275" text-anchor="middle">400 Bad Request</text>
    <rect x="475" y="250" width="150" height="40" rx="8" fill="#ef4444"/><text x="550" y="275" text-anchor="middle">404 Not Found</text>
    <rect x="640" y="250" width="120" height="40" rx="8" fill="#7f1d1d"/><text x="700" y="275" text-anchor="middle" font-size="11">500 Server Err</text>
  </g>

  <defs>
    <marker id="a3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
