<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="700" height="260" fill="#1e293b" rx="16"/>
  <text x="350" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold">JavaScript Primitive Data Types</text>

  <g font-size="13" fill="white" font-weight="bold">
    <rect x="30" y="60" width="100" height="60" rx="8" fill="#0ea5e9"/>
    <text x="80" y="95" text-anchor="middle">String</text>

    <rect x="150" y="60" width="100" height="60" rx="8" fill="#14b8a6"/>
    <text x="200" y="95" text-anchor="middle">Number</text>

    <rect x="270" y="60" width="100" height="60" rx="8" fill="#f59e0b"/>
    <text x="320" y="95" text-anchor="middle">Boolean</text>

    <rect x="390" y="60" width="100" height="60" rx="8" fill="#ef4444"/>
    <text x="440" y="95" text-anchor="middle">Undefined</text>

    <rect x="510" y="60" width="80" height="60" rx="8" fill="#8b5cf6"/>
    <text x="550" y="95" text-anchor="middle" font-size="12">Null</text>

    <rect x="610" y="60" width="60" height="60" rx="8" fill="#ec4899"/>
    <text x="640" y="90" text-anchor="middle" font-size="11">Symbol</text>
  </g>

  <rect x="30" y="150" width="640" height="80" rx="10" fill="#0f172a" stroke="#334155"/>
  <text x="50" y="175" fill="#4ade80" font-size="13" font-family="monospace">let name = "Divyansh";      // String</text>
  <text x="50" y="195" fill="#4ade80" font-size="13" font-family="monospace">const age = 21;              // Number</text>
  <text x="50" y="215" fill="#4ade80" font-size="13" font-family="monospace">let isIntern = true;         // Boolean</text>
</svg>
